    <script>
        (function() {
            const cmd1Text = "locate /home/blog";
            const error1Text = "Error: 404 Not Found";
            const cmd2Text = "check-progress --page blog";

            const cmd1El = document.getElementById("cmd-1-text");
            const error1El = document.getElementById("error-1");
            const cmd2El = document.getElementById("cmd-2-text");
            const jsonEl = document.getElementById("json-output");
            const cursor1 = document.getElementById("cursor-1");
            const cursor2 = document.getElementById("cursor-2");
            const cursor3 = document.getElementById("cursor-3");

            function typeWriter(text, element, callback) {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, 30 + Math.random() * 40);
                    } else if (callback) {
                        callback();
                    }
                }
                type();
            }

            // Start typing simulation sequence
            setTimeout(() => {
                typeWriter(cmd1Text, cmd1El, () => {
                    if (cursor1) cursor1.style.display = "none";
                    if (error1El) {
                        error1El.textContent = error1Text;
                        error1El.style.display = "block";
                    }
                    setTimeout(() => {
                        if (cmd2El) {
                            cmd2El.parentElement.style.display = "block";
                            if (cursor2) cursor2.style.display = "inline-block";
                            typeWriter(cmd2Text, cmd2El, () => {
                                if (cursor2) cursor2.style.display = "none";
                                if (jsonEl) {
                                    jsonEl.style.display = "block";
                                    setTimeout(() => {
                                        if (cursor3) {
                                            cursor3.parentElement.style.display = "block";
                                            cursor3.style.display = "inline-block";
                                        }
                                    }, 200);
                                }
                            });
                        }
                    }, 400);
                });
            }, 300);
        })();
    </script>
